name: Build release

on:
  pull_request:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version used in the installers
        required: false
        default: v0.0.0-dev.0
      goplus_ref:
        description: goonward/goplus commit or ref
        required: false

permissions:
  contents: read

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      goplus_ref: ${{ steps.read.outputs.goplus_ref }}
      tools_ref: ${{ steps.read.outputs.tools_ref }}
      gopls_ref: ${{ steps.read.outputs.gopls_ref }}
    steps:
      - uses: actions/checkout@v7
      - id: read
        shell: bash
        run: |
          source versions.env
          echo "goplus_ref=$GOPLUS_REF" >> "$GITHUB_OUTPUT"
          echo "tools_ref=$TOOLS_REF" >> "$GITHUB_OUTPUT"
          echo "gopls_ref=$GOPLS_REF" >> "$GITHUB_OUTPUT"

  linux:
    needs: versions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/checkout@v7
        with:
          repository: goonward/goplus
          ref: ${{ inputs.goplus_ref || needs.versions.outputs.goplus_ref }}
          path: goplus

      - uses: actions/setup-go@v7
        with:
          go-version: 1.26.3
          cache: false

      - name: Test release tools
        run: go test ./...

      - name: Build Linux release
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version || 'v0.0.0-dev.0' }}
          TOOLS_REF: ${{ needs.versions.outputs.tools_ref }}
          GOPLS_REF: ${{ needs.versions.outputs.gopls_ref }}
        run: bash scripts/build-linux.sh "$GITHUB_WORKSPACE/goplus" "$GITHUB_WORKSPACE/dist" "$VERSION" "$TOOLS_REF" "$GOPLS_REF"

      - uses: actions/upload-artifact@v7
        with:
          name: linux-release
          path: dist/*
          if-no-files-found: error

  windows:
    needs: versions
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7

      - uses: actions/checkout@v7
        with:
          repository: goonward/goplus
          ref: ${{ inputs.goplus_ref || needs.versions.outputs.goplus_ref }}
          path: goplus

      - uses: actions/setup-go@v7
        with:
          go-version: 1.26.3
          cache: false

      - name: Test release tools
        run: go test ./...

      - name: Build Windows release
        shell: pwsh
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version || 'v0.0.0-dev.0' }}
          TOOLS_REF: ${{ needs.versions.outputs.tools_ref }}
          GOPLS_REF: ${{ needs.versions.outputs.gopls_ref }}
        run: ./scripts/build-windows.ps1 -SourceRoot "$env:GITHUB_WORKSPACE\goplus" -OutputDir "$env:GITHUB_WORKSPACE\dist" -Version $env:VERSION -ToolsRef $env:TOOLS_REF -GoplsRef $env:GOPLS_REF

      - uses: actions/upload-artifact@v7
        with:
          name: windows-release
          path: dist/*
          if-no-files-found: error

  publish:
    if: github.ref_type == 'tag'
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: "*-release"
          path: dist
          merge-multiple: true

      - name: Write checksums
        run: cd dist && sha256sum * | sort -k2 > SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --generate-notes --verify-tag
